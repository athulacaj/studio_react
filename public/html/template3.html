    <style>
        .maps-iframe {
            filter: grayscale(40%) sepia(20%) brightness(0.95);

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;

        /* Scroll animations */
        .fade-in-section {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .fade-in-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Stagger children animation */
        .stagger-children>* {
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .stagger-children.visible>*:nth-child(1) {
            transition-delay: 0.1s;
        }

        .stagger-children.visible>*:nth-child(2) {
            transition-delay: 0.25s;
        }

        .stagger-children.visible>*:nth-child(3) {
            transition-delay: 0.4s;
        }

        .stagger-children.visible>*:nth-child(4) {
            transition-delay: 0.55s;
        }

        .stagger-children.visible>* {
            opacity: 1;
            transform: translateY(0);
        }

        /* Botanical ornament divider */
        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .ornament::before,
        .ornament::after {
            content: '';
            flex: 0 0 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8a9a82);
        }

        .ornament::after {
            background: linear-gradient(90deg, #8a9a82, transparent);
        }

        .ornament .leaf {
            color: #8a9a82;
            font-size: 18px;
            opacity: 0.7;
        }

        /* Card hover lift */
        .card-lift {
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .card-lift:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(61, 80, 64, 0.08),
                0 8px 20px rgba(61, 80, 64, 0.04);
        }

        /* Gallery mosaic hover */
        .gallery-mosaic .gallery-card {
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                border-color 0.4s ease;
        }

        .gallery-mosaic .gallery-card:hover {
            transform: scale(1.02);
            border-color: rgba(196, 145, 138, 0.4);
        }

        .gallery-mosaic .gallery-card img {
            transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .gallery-mosaic .gallery-card:hover img {
            transform: scale(1.06);
        }

        /* Soft blush gradient for hero overlay */
        .hero-gradient {
            background: linear-gradient(180deg,
                    rgba(250, 245, 240, 0.1) 0%,
                    rgba(250, 245, 240, 0) 30%,
                    rgba(250, 245, 240, 0) 60%,
                    rgba(250, 245, 240, 0.85) 90%,
                    rgba(250, 245, 240, 1) 100%);
        }

        /* Decorative corner borders */
        .corner-frame {
            position: relative;
        }

        .corner-frame::before,
        .corner-frame::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: rgba(196, 145, 138, 0.4);
            pointer-events: none;
        }

        .corner-frame::before {
            top: -1px;
            left: -1px;
            border-top: 1px solid;
            border-left: 1px solid;
        }

        .corner-frame::after {
            bottom: -1px;
            right: -1px;
            border-bottom: 1px solid;
            border-right: 1px solid;
        }

        /* Subtle texture */
        body {
            background-image:
                radial-gradient(circle at 20% 50%, rgba(196, 145, 138, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(74, 96, 80, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(193, 122, 80, 0.03) 0%, transparent 50%);
        }

        ::selection {
            background: rgba(196, 145, 138, 0.25);
            color: #2d3728;

        }

            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(138, 154, 130, 0.55);

    <script>
        // Intersection Observer for scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in-section').forEach(section => {
            observer.observe(section);
        });

        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
